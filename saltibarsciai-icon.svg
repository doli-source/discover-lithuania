<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- drop shadow -->
  <ellipse cx="40" cy="71" rx="16" ry="2" fill="#a08050" opacity="0.18"/>

  <!-- Bowl body (cream) -->
  <path d="M11 38 C11 65 26 69 40 69 C54 69 69 65 69 38 Z" fill="#fdf8ee"/>

  <!-- Pink soup fill -->
  <path d="M14.5 40 C14.5 64 27 67 40 67 C53 67 65.5 64 65.5 40 Z" fill="#cc1c5e"/>

  <!-- Soup top surface -->
  <ellipse cx="40" cy="40" rx="25.5" ry="5.8" fill="#d82870"/>

  <!-- Soup highlight -->
  <ellipse cx="29" cy="38.5" rx="7" ry="2" fill="#e84a7a" opacity="0.5"/>

  <!-- Boiled egg on soup surface -->
  <circle cx="47" cy="39" r="3.8" fill="#fdfaf0"/>
  <circle cx="47" cy="39" r="2" fill="#fde68a"/>

  <!-- Bowl rim outer (cream) -->
  <ellipse cx="40" cy="38" rx="29" ry="7" fill="#fdf8ee"/>
  <!-- Rim inner — pink soup visible through opening -->
  <ellipse cx="40" cy="38" rx="25.5" ry="5.5" fill="#d82870"/>

  <!-- SPOON — drawn last so it sits on top of everything -->
  <!-- Handle shadow (soft, for contrast against light bg) -->
  <line x1="33" y1="38" x2="71" y2="6" stroke="#c0a870" stroke-width="6.5" stroke-linecap="round" opacity="0.22"/>
  <!-- Handle -->
  <line x1="33" y1="37" x2="71" y2="6" stroke="#f5ede0" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Spoon head shadow -->
  <ellipse cx="27" cy="45.5" rx="8.5" ry="5.5" fill="#b89060" opacity="0.2" transform="rotate(42 27 45.5)"/>
  <!-- Spoon head (oval) -->
  <ellipse cx="27" cy="45" rx="7.5" ry="4.8" fill="#f5ede0" transform="rotate(42 27 45)"/>
  <!-- Spoon concave (inner shadow) -->
  <ellipse cx="27" cy="45.5" rx="4.8" ry="2.8" fill="#d8c8a8" opacity="0.45" transform="rotate(42 27 45)"/>
</svg>
