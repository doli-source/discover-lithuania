<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Bowl body (cream/natural) -->
  <path d="M9 33 Q9 61 36 64 Q63 61 63 33 Z" fill="#f0e6d0"/>
  <!-- Pink soup fill -->
  <path d="M12.5 35 Q12.5 59 36 62 Q59.5 59 59.5 35 Z" fill="#e8407a"/>
  <!-- Soup surface ellipse (lighter pink on top) -->
  <ellipse cx="36" cy="35" rx="23.5" ry="5.5" fill="#f0538a"/>
  <!-- Bowl rim (front) -->
  <ellipse cx="36" cy="33" rx="27" ry="6.5" fill="#f0e6d0"/>
  <!-- Rim inner shadow (shows soup through rim) -->
  <ellipse cx="36" cy="33" rx="23.5" ry="5" fill="#f0538a"/>
  <!-- Soup highlight -->
  <ellipse cx="29" cy="33.5" rx="7" ry="1.8" fill="#f472b6" opacity="0.55"/>
  <!-- Small egg garnish hint (white dot) -->
  <circle cx="44" cy="34" r="3.5" fill="#fff9f0" opacity="0.9"/>
  <circle cx="44" cy="34" r="2" fill="#fef08a" opacity="0.85"/>
</svg>
